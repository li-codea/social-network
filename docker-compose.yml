# ============================================================
# 社交网络好友推荐系统 — Docker Compose 编排
# 启动: docker compose up -d
# 停止: docker compose down
# 清库重建: docker compose down -v && docker compose up -d
# ============================================================
version: "3.9"

services:
  # -----------------------------------------------------------
  # MySQL 8.0 数据库服务
  # -----------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: social-network-db
    restart: unless-stopped

    # 环境变量：首次启动时创建数据库和 root 用户
    environment:
      MYSQL_ROOT_PASSWORD: mysql@123          # root 密码
      MYSQL_DATABASE: social_network          # 自动创建数据库
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci

    # 端口映射：宿主机 3307 → 容器 3306（避免与本地 MySQL 冲突）
    ports:
      - "3307:3306"

    # 挂载初始化脚本 + 数据持久化
    volumes:
      - ./mysql/init:/docker-entrypoint-initdb.d  # 首次启动执行 .sql
      - ./mysql/conf.d:/etc/mysql/conf.d          # MySQL 配置（字符集等）
      - mysql-data:/var/lib/mysql                  # 数据持久化

    # 健康检查：MySQL 就绪后 backend 才启动
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pmysql@123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

    networks:
      - social-network

  # -----------------------------------------------------------
  # FastAPI 后端服务
  # -----------------------------------------------------------
  backend:
    build: ./backend
    container_name: social-network-backend
    restart: unless-stopped

    # 数据库连接：注意 HOST 填服务名 db（Docker 内部 DNS）
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: mysql@123
      DB_NAME: social_network
      DB_ECHO: "false"

    ports:
      - "8000:8000"

    depends_on:
      db:
        condition: service_healthy   # 等 MySQL 健康检查通过再启动

    networks:
      - social-network

# -----------------------------------------------------------
# 数据卷 + 网络
# -----------------------------------------------------------
volumes:
  mysql-data:
    driver: local

networks:
  social-network:
    driver: bridge
